version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./database.db:/app/database.db
    env_file:
      - .env
    restart: always

  frontend:
    # Assuming frontend Dockerfile exists or using Nginx for production
    image: node:18-slim
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
    command: npm run dev
    restart: always
