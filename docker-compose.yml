version: '3.8'

services:
  backend:
    build: .
    # Persist all data in one folder
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --url http://nginx:80
    restart: always
